# EEG SSL pretraining config (two-view VICReg on TUAB_PREPROCESSED).
meta:
  seed: 0
  ckpt_dir: /lustre/work/vivatech-equipe7/aouladali/eb_jepa/checkpoints/eeg
experiment:
  seed: 0
  model_name: temporal_jepa
  dataset_name: TUAB
  split: train
  notes: "Temporal JEPA EEG SSL training"
data:
  data_root: /lustre/work/pdl17890/udl806719/datasets/Neuro/TUAB-TUEV/TUAB_PREPROCESSED
  manifest_path: /lustre/work/vivatech-equipe7/aouladali/eeg_audit/output/edf_inventory.csv
  split: train
  n_channels: 19
  sfreq: 200
  window_sec: 10.0
  apply_signal_preprocessing: false  # TUAB_PREPROCESSED already did these steps
  filter_pad_sec: 10.0
  bandpass_low_hz: 0.1
  bandpass_high_hz: 75.0
  notch_hz: 60.0
  epoch_size: 4000        # random windows per epoch
  batch_size: 128
  num_workers: 8
  aug_noise_std: 0.1
  aug_scale_jitter: 0.2
  aug_chan_drop_p: 0.2
  aug_time_mask_frac: 0.2
model:
  architecture: video_jepa
  in_channels: 19
  out_dim: 256          # latent dim D (encoder output)
  base_filters: 64
  projector_spec: "256-512-1024"
  std_coeff: 1.0
  cov_coeff: 1.0
optim:
  epochs: 50
  lr: 0.001
  weight_decay: 1.0e-6
wandb:
  enabled: false
  project: eb-jepa-eeg
  entity: null
  run_name: temporal_jepa_tuab
  group: temporal-jepa
  job_type: train
  tags:
    - eeg
    - tuab
    - temporal-jepa
    - ssl
  log_interval: 50
  watch_model: false
  save_artifact: true
  artifact_name: model-temporal-jepa-tuab
  best_metric: train/epoch_loss
  best_mode: min
