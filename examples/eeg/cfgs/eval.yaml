# EEG downstream eval config (patient-disjoint abnormality probe).
# The split is the golden rule: fit on `train` patients, score on `eval` patients
# (no subject overlap). The eval number is the one that answers transferability.
n_windows: 16            # evenly-spaced windows mean-pooled per recording
eval:
  checkpoint_path: checkpoints/eeg/temporal_jepa/best.pth.tar
  metrics:
    - accuracy
    - balanced_accuracy
    - auroc
    - f1_score
    - confusion_matrix
  label_fractions:
    - 0.05
    - 0.25
    - 0.75
    - 1.0
  source_train_run_id: null
wandb:
  enabled: false
  project: eb-jepa-eeg
  entity: null
  run_name: eval_temporal_jepa_tuab
  group: temporal-jepa
  job_type: eval
  tags:
    - eeg
    - tuab
    - evaluation
    - linear-probe
  use_artifact: false
  artifact_name: model-temporal-jepa-tuab:best
# TUEV idea (TODO, optional): swap to the harder 6-class event variant — the
# probe becomes a multi-class, second-level classifier (see README extension).
